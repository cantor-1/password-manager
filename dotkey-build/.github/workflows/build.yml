name: Build DOTKEY

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'core/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: |
          cd core && npm ci && npm run build && cd ..
          cd desktop && npm ci && cd ..

      - name: Build Tauri Mac
        run: |
          cd desktop
          npm run tauri-build-mac
        env:
          CI: true

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotkey-mac
          path: desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'core/package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: |
          cd core
          npm ci
          npm run build
          cd ..\desktop
          npm ci

      - name: Build Tauri Windows
        run: |
          cd desktop
          npm run tauri-build-win
        env:
          CI: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotkey-windows
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'core/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd core && npm ci && npm run build && cd ..
          cd android && npm ci && cd ..

      - name: Build web assets
        run: |
          cd android
          npm run build

      - name: Sync Capacitor
        run: |
          cd android
          npx cap sync

      - name: Build Android APK
        run: |
          cd android/android
          ./gradlew assembleRelease

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotkey-android
          path: android/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

  release:
    needs: [build-mac, build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dotkey-mac/**/*.app
            dotkey-windows/**/*.msi
            dotkey-android/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
