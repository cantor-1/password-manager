name: Build DOTKEY

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
      - uses: android-actions/setup-android@v3

      - name: Build core
        working-directory: ./dotkey-build/core
        run: |
          npm install
          npm i --save-dev @types/libsodium-wrappers || true
          npm run build

      - name: Build Android
        working-directory: ./dotkey-build/android
        run: |
          npm install
          npm run build
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Locate APK
        run: |
          mkdir -p ./apk-output
          find ./dotkey-build/android -name "*.apk" -type f -exec cp {} ./apk-output/ \;
          ls -la ./apk-output/

      - uses: actions/upload-artifact@v4
        with:
          name: DOTKEY-Android
          path: ./apk-output/*.apk

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable

      - name: Build core
        working-directory: ./dotkey-build/core
        shell: bash
        run: |
          npm install
          npm i --save-dev @types/libsodium-wrappers || true
          npm run build

      - name: Build Windows
        working-directory: ./dotkey-build/desktop
        shell: bash
        run: |
          npm install
          npm run tauri-build-win

      - name: Locate MSI
        shell: bash
        run: |
          mkdir -p ./msi-output
          find ./dotkey-build/desktop -name "*.msi" -type f -exec cp {} ./msi-output/ \;
          ls -la ./msi-output/

      - uses: actions/upload-artifact@v4
        with:
          name: DOTKEY-Windows
          path: ./msi-output/*.msi

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable

      - name: Build core
        working-directory: ./dotkey-build/core
        run: |
          npm install
          npm i --save-dev @types/libsodium-wrappers || true
          npm run build

      - name: Build macOS
        working-directory: ./dotkey-build/desktop
        run: |
          npm install
          npm run tauri-build-mac

      - name: Locate App
        run: |
          mkdir -p ./mac-output
          find ./dotkey-build/desktop -name "*.app" -type d -exec cp -R {} ./mac-output/ \;
          ls -la ./mac-output/

      - uses: actions/upload-artifact@v4
        with:
          name: DOTKEY-macOS
          path: ./mac-output/*.app

  release:
    needs: [android, windows, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
